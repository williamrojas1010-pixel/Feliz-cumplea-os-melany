<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feliz Cumpleaños Melany 🎉</title>

  <style>
    body {
      background: linear-gradient(45deg, #ff9a9e, #fad0c4);
      text-align: center;
      font-family: Arial;
      padding-top: 50px;
      overflow: hidden;
    }

    h1 {
      font-size: 40px;
      color: white;
      animation: aparecer 2s ease;
    }

    p {
      font-size: 20px;
      color: white;
      animation: aparecer 3s ease;
    }

    @keyframes aparecer {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    .emoji {
      font-size: 30px;
      animation: saltar 1s infinite;
    }

    @keyframes saltar {
      0% {transform: translateY(0);}
      50% {transform: translateY(-10px);}
      100% {transform: translateY(0);}
    }

    button {
      padding: 12px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>🎉 Feliz Cumpleaños Melany 🎉</h1>

  <p>Hoy cumple alguien muy especial 😏</p>
  <p>Alguien divertida… y que me cae demasiado bien 😄</p>
  <p>Espero sacarte una sonrisa aunque sea con esto 😌</p>

  <div class="emoji">🥳 🎂 😄 🎈</div>

  <!-- BOTÓN SORPRESA -->
  <button onclick="mostrarMensaje()">Toca aquí 😏</button>

  <p id="mensaje" style="display:none; font-size:20px;">
    Ok… ahora sí 😌<br>
    Me gustas mucho 💖<br>
    PD: el 3 de abril te debo una sonrisa en persona 😉
  </p>

  <!-- 🎵 MÚSICA -->
  <audio autoplay loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <!-- 🎊 CONFETI -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    function mostrarMensaje() {
      document.getElementById("mensaje").style.display = "block";
    }

    confetti({
      particleCount: 150,
      spread: 70,
      origin: { y: 0.6 }
    });
  </script>

</body>
</html>
