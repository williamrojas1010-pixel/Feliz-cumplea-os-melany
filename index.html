<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Melany 💫</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
  overflow: hidden;
}

/* 🌌 estrellas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* texto */
#contenido {
  position: relative;
  z-index: 2;
  margin-top: 100px;
}

h1 {
  font-size: 45px;
  color: #00c6ff;
}

/* botón */
.btn {
  margin-top: 30px;
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 20px;
  background: #00c6ff;
  color: white;
  cursor: pointer;
}

/* mensaje final */
#final {
  display: none;
  font-size: 22px;
  margin-top: 20px;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="contenido">
  <h1>🎉 Feliz Cumpleaños Melany 🎉</h1>
  <p id="texto"></p>

  <button class="btn" onclick="sorpresa()">Toca aquí 👀</button>

  <div id="final">
    😳 Bueno… ahora sí<br><br>
    Tal vez no es perfecto… 😌<br>
pero está hecho pensando en tu sonrisa 💖
  </div>
</div>

<!-- 🎵 música -->
<audio autoplay loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- 🎊 confeti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
/* ✨ estrellas */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let estrellas = [];
for (let i = 0; i < 100; i++) {
  estrellas.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2
  });
}

function dibujar() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";
  estrellas.forEach(e => {
    ctx.fillRect(e.x, e.y, e.size, e.size);
    e.y += 0.3;
    if (e.y > canvas.height) e.y = 0;
  });
  requestAnimationFrame(dibujar);
}
dibujar();

/* ⌨️ texto escribiéndose */
let mensaje = "No sabía cómo sorprenderte… 😌<br>
así que hice esto solo para ti 💫";
let i = 0;

function escribir() {
  if (i < mensaje.length) {
    document.getElementById("texto").innerHTML += mensaje.charAt(i);
    i++;
    setTimeout(escribir, 40);
  }
}
escribir();

/* 😏 sorpresa */
function sorpresa() {
  document.getElementById("final").style.display = "block";

  confetti({
    particleCount: 250,
    spread: 100,
    origin: { y: 0.6 }
  });
}
</script>

</body>
</html>
