<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melany ✨</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  color: white;
}

/* VIDEO */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.65);
  z-index: -2;
}

/* OVERLAY PRO */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0.2));
  z-index: -1;
}

/* CONTENEDOR */
.container {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
  opacity: 0;
  transform: translateY(30px);
  transition: 1s;
}

.container.active {
  opacity: 1;
  transform: translateY(0);
}

/* TITULO PRO */
h1 {
  font-size: 52px;
  font-weight: 700;
  margin: 0;
  background: linear-gradient(90deg, #ffd700, #fff3c4);
  -webkit-background-clip: text;
  color: transparent;
}

/* SUBTITULO */
p {
  font-size: 20px;
  font-weight: 300;
  margin-top: 15px;
  max-width: 400px;
}

/* BOTÓN */
button {
  margin-top: 30px;
  padding: 14px 35px;
  border-radius: 30px;
  border: none;
  font-size: 18px;
  background: rgba(255,255,255,0.15);
  color: white;
  backdrop-filter: blur(10px);
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.25);
}

/* MENSAJE */
#mensaje {
  font-size: 20px;
  line-height: 1.6;
  margin-top: 20px;
}

/* FINAL */
.final h1 {
  font-size: 40px;
}
</style>
</head>

<body>

<video autoplay muted loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- PANTALLA 1 -->
<div class="container active" id="p1">
  <h1>MELANY</h1>
</div>

<!-- PANTALLA 2 -->
<div class="container" id="p2">
  <h1>Feliz cumpleaños 🎉</h1>
  <p>Hoy es un día especial</p>
  <button onclick="inicio()">Continuar</button>
</div>

<!-- PANTALLA 3 -->
<div class="container" id="p3">
  <div id="mensaje"></div>
  <button onclick="siguiente(4)">Ver más</button>
</div>

<!-- PANTALLA 4 -->
<div class="container final" id="p4">
  <h1>Disfruta tu día ✨</h1>
  <p>Que todo te salga bonito</p>
  <p style="margin-top:20px;">— William</p>
</div>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
let pantallas = ["p1","p2","p3","p4"];

// intro
setTimeout(() => mostrar("p2"), 2500);

function mostrar(id) {
  pantallas.forEach(p => document.getElementById(p).classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if (id === "p3") escribir();
  if (id === "p4" && navigator.vibrate) navigator.vibrate([200,100,200]);
}

function siguiente(num){
  mostrar("p"+num);
}

function inicio(){
  mostrar("p3");

  let audio = document.getElementById("musica");
  audio.volume = 0;
  audio.play();

  let vol = 0;
  let fade = setInterval(()=>{
    if(vol < 1){
      vol += 0.05;
      audio.volume = vol;
    } else clearInterval(fade);
  },100);
}

// texto pro
function escribir(){
  let texto = "Hoy es un día especial.\n\nQue sonrías mucho,\nque disfrutes cada momento,\ny que todo lo bonito llegue a ti.\n\nFeliz cumpleaños 🎂";
  let i = 0;
  let cont = document.getElementById("mensaje");
  cont.innerHTML = "";

  function escribirLetra(){
    if(i < texto.length){
      cont.innerHTML += texto.charAt(i);
      i++;
      setTimeout(escribirLetra, 35);
    }
  }
  escribirLetra();
}
</script>

</body>
</html>
