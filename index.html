<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz cumpleaños Melany 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* VIDEO */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.8);
  z-index: -2;
}

/* OSCURO */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

/* CONTENEDOR */
.container {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 100%;
  padding: 20px;
  transition: 1s;
}

/* OCULTO */
.oculto {
  opacity: 0;
  pointer-events: none;
}

/* TITULO */
h1 {
  font-size: 42px;
}

/* TEXTO */
#mensaje {
  font-size: 20px;
  line-height: 1.6;
  white-space: pre-line;
  margin-top: 15px;
}

/* BOTON */
button {
  margin-top: 25px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<video autoplay muted loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- PANTALLA 1 -->
<div class="container" id="pantalla1">
  <h1>🎉 Feliz cumpleaños Melany 🎉</h1>
  <div id="mensaje"></div>
  <button onclick="iniciar()">Toca aquí 💖</button>
</div>

<!-- PANTALLA FINAL -->
<div class="container oculto" id="pantalla2">
  <h1>💫 Eres muy especial 💫</h1>
  <p style="font-size:22px; margin-top:20px;">
    Que nunca te falten motivos para sonreír 💖
  </p>
  <p style="margin-top:25px;">— William</p>
</div>

<audio id="musica" loop>
  <source src="musica.mp3">
</audio>

<script>
function iniciar(){
  let audio = document.getElementById("musica");
  audio.volume = 0;
  audio.play();

  let v = 0;
  let fade = setInterval(()=>{
    if(v < 1){
      v += 0.05;
      audio.volume = v;
    } else clearInterval(fade);
  },100);

  escribirMensaje();
}

// TEXTO
function escribirMensaje(){
  let texto = "🎂 Hoy es tu día especial\n\nEspero que sonrías mucho 😄\nque la pases increíble\n\ny que todo te salga bonito ✨\n\nQue este nuevo año\nte traiga cosas lindas 💫\n\nFeliz cumpleaños 🎉";

  let cont = document.getElementById("mensaje");
  cont.innerHTML = "";

  let i = 0;

  function escribir(){
    if(i < texto.length){
      cont.innerHTML += texto.charAt(i);
      i++;
      setTimeout(escribir, 40);
    } else {
      // 👉 CUANDO TERMINA → SORPRESA
      setTimeout(mostrarFinal, 2000);
    }
  }

  escribir();
}

// 🎁 SORPRESA FINAL
function mostrarFinal(){
  document.getElementById("pantalla1").classList.add("oculto");
  document.getElementById("pantalla2").classList.remove("oculto");

  if(navigator.vibrate){
    navigator.vibrate([200,100,200]);
  }
}
</script>

</body>
</html>
