<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Melany ✨</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  color: white;
}

/* 🎥 VIDEO */
video {
  position: fixed;
  top: 0;
  left: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  z-index: -3;
  filter: brightness(0.65);
}

/* 🌙 OVERLAY CALIDO */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: -2;
}

/* 💖 CORAZONES */
.heart {
  position: fixed;
  font-size: 20px;
  animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}

/* PANTALLAS */
.pantalla {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  transition: 1s;
}

.oculta {
  opacity: 0;
  transform: scale(0.9);
  pointer-events: none;
}

/* 🌟 TITULO DORADO */
h1 {
  font-size: 65px;
  background: linear-gradient(90deg, #ffd700, #fff3c4, #ffd700);
  -webkit-background-clip: text;
  color: transparent;
  animation: brillo 4s linear infinite;
}

/* TEXTO */
p {
  font-size: 26px;
  opacity: 0.95;
}

/* BOTÓN PRO */
.btn {
  margin-top: 25px;
  padding: 16px 40px;
  border-radius: 40px;
  border: none;
  font-size: 22px;
  background: linear-gradient(45deg, #ffb347, #ffd700);
  color: black;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(255,215,0,0.5);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* MENSAJE */
#mensaje {
  font-size: 26px;
  white-space: pre-line;
  line-height: 1.7;
}

/* ANIMACIÓN */
@keyframes brillo {
  0% { background-position: 0% }
  100% { background-position: 200% }
}
</style>
</head>

<body>

<video autoplay muted loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- P1 -->
<div class="pantalla" id="p1">
  <h1>MELANY 💫</h1>
</div>

<!-- P2 -->
<div class="pantalla oculta" id="p2">
  <h1>🎉 FELIZ CUMPLEAÑOS 🎉</h1>
  <p>Hoy es un día especial ✨</p>
  <button class="btn" onclick="inicio()">Continuar</button>
</div>

<!-- P3 -->
<div class="pantalla oculta" id="p3">
  <div id="mensaje"></div>
  <button class="btn" onclick="siguiente(4)">Ver más</button>
</div>

<!-- P4 FINAL -->
<div class="pantalla oculta" id="p4">
  <h1>🎂 DISFRUTA TU DÍA 🎂</h1>
  <p>Que todo te salga bonito hoy ✨</p>

  <h1 style="margin-top:30px;">💌 William</h1>
  <p>Te desea un feliz cumpleaños 🎉</p>
</div>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
// Intro
setTimeout(() => siguiente(2), 2500);

function siguiente(num) {
  document.querySelectorAll(".pantalla").forEach(p => p.classList.add("oculta"));
  document.getElementById("p" + num).classList.remove("oculta");

  if (num === 3) escribir();

  if (num === 4 && navigator.vibrate) {
    navigator.vibrate([200,100,200]);
  }
}

// 🎵 MUSICA
function inicio() {
  siguiente(3);

  let audio = document.getElementById("musica");
  audio.volume = 0;
  audio.play();

  let vol = 0;
  let fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.05;
      audio.volume = vol;
    } else clearInterval(fade);
  }, 100);
}

// 💬 TEXTO
function escribir() {
  let texto = "🎂 Hoy es un día especial\nporque alguien increíble cumple años ✨\n\nEspero que sonrías mucho hoy 😄\nque te rías sin parar\n\nque todo te salga bonito 💫\n\ny que este nuevo año\nte traiga momentos increíbles 🎉";

  let i = 0;
  let cont = document.getElementById("mensaje");
  cont.innerHTML = "";

  function escribirLetra() {
    if (i < texto.length) {
      cont.innerHTML += texto.charAt(i);
      i++;
      setTimeout(escribirLetra, 30);
    }
  }
  escribirLetra();
}

// 💖 CORAZONES AL TOCAR
document.addEventListener("click", function(e) {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";

  heart.style.left = e.clientX + "px";
  heart.style.top = e.clientY + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 2000);
});
</script>

</body>
</html>
