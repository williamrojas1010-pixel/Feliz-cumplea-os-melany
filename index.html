<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Melany ✨</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  color: white;
}

/* 🎥 VIDEO PERFECTO */
video {
  position: fixed;
  top: 0;
  left: 0;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;
  z-index: -3;
  filter: brightness(0.6);
}

/* 🌙 OSCURECIDO SUAVE */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: -2;
}

/* ✨ PARTÍCULAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* PANTALLAS */
.pantalla {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  transition: 1s;
}

.oculta {
  opacity: 0;
  transform: scale(0.9);
  pointer-events: none;
}

/* 🌟 TITULO PRO */
h1 {
  font-size: 65px;
  background: linear-gradient(90deg, #00c6ff, #ffffff, #00c6ff);
  -webkit-background-clip: text;
  color: transparent;
  animation: brillo 3s linear infinite;
}

/* TEXTO */
p {
  font-size: 26px;
  opacity: 0.95;
}

/* BOTÓN */
.btn {
  margin-top: 25px;
  padding: 16px 40px;
  border-radius: 40px;
  border: none;
  font-size: 22px;
  background: rgba(0,198,255,0.8);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.08);
}

/* MENSAJE */
#mensaje {
  font-size: 26px;
  white-space: pre-line;
  line-height: 1.7;
}

/* ANIMACIÓN */
@keyframes brillo {
  0% { background-position: 0% }
  100% { background-position: 200% }
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<canvas id="particles"></canvas>

<!-- P1 -->
<div class="pantalla" id="p1">
  <h1>MELANY 💫</h1>
</div>

<!-- P2 -->
<div class="pantalla oculta" id="p2">
  <h1>🎉 FELIZ CUMPLEAÑOS 🎉</h1>
  <p>Hoy es un día especial ✨</p>
  <button class="btn" onclick="inicio()">Continuar</button>
</div>

<!-- P3 -->
<div class="pantalla oculta" id="p3">
  <div id="mensaje"></div>
  <button class="btn" onclick="siguiente(4)">Ver más</button>
</div>

<!-- P4 FINAL -->
<div class="pantalla oculta" id="p4">
  <h1>🎂 DISFRUTA TU DÍA 🎂</h1>
  <p>Que todo te salga bonito hoy ✨</p>

  <h1 style="margin-top:30px;">💌 William</h1>
  <p>Te desea un feliz cumpleaños 🎉</p>
</div>

<!-- MUSICA -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
// Intro
setTimeout(() => siguiente(2), 2500);

function siguiente(num) {
  document.querySelectorAll(".pantalla").forEach(p => p.classList.add("oculta"));
  document.getElementById("p" + num).classList.remove("oculta");

  if (num === 3) escribir();

  if (num === 4 && navigator.vibrate) {
    navigator.vibrate([200,100,200]);
  }
}

// 🎵 MUSICA DESDE BOTÓN
function inicio() {
  siguiente(3);

  let audio = document.getElementById("musica");
  audio.volume = 0;
  audio.play();

  let vol = 0;
  let fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.05;
      audio.volume = vol;
    } else clearInterval(fade);
  }, 100);
}

// 💬 TEXTO PRO
function escribir() {
  let texto = "🎂 Hoy es un día especial\nporque alguien increíble cumple años ✨\n\nEspero que sonrías mucho hoy 😄\nque te rías sin parar\n\nque todo te salga bonito 💫\n\ny que este nuevo año\nte traiga momentos increíbles 🎉";

  let i = 0;
  let cont = document.getElementById("mensaje");
  cont.innerHTML = "";

  function escribirLetra() {
    if (i < texto.length) {
      cont.innerHTML += texto.charAt(i);
      i++;
      setTimeout(escribirLetra, 30);
    }
  }
  escribirLetra();
}

// ✨ PARTÍCULAS PRO
let canvas = document.getElementById("particles");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 100; i++) {
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2,
    speed: Math.random()*0.7
  });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";

  particles.forEach(p => {
    ctx.fillRect(p.x, p.y, p.size, p.size);
    p.y += p.speed;
    if (p.y > canvas.height) p.y = 0;
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
