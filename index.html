<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Melany 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  color: white;
  text-align: center;
}

/* VIDEO BONITO */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.7);
  z-index: -2;
}

/* OVERLAY SUAVE */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

/* CONTENIDO */
.container {
  position: absolute;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  padding: 20px;
}

/* TITULO */
h1 {
  font-size: 42px;
  margin-bottom: 20px;
}

/* TEXTO */
#mensaje {
  font-size: 20px;
  line-height: 1.6;
  opacity: 0;
  transition: 1s;
}

/* BOTON */
button {
  margin-top: 30px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<video autoplay muted loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
  <h1>Melany 💫</h1>

  <div id="mensaje"></div>

  <button onclick="iniciar()">Toca aquí 💖</button>
</div>

<audio id="musica" loop>
  <source src="musica.mp3">
</audio>

<script>
function iniciar(){
  let audio = document.getElementById("musica");
  audio.volume = 0;
  audio.play();

  let v = 0;
  let fade = setInterval(()=>{
    if(v < 1){
      v += 0.05;
      audio.volume = v;
    } else clearInterval(fade);
  },100);

  escribir();
}

// TEXTO BONITO
function escribir(){
  let texto = "🎂 Hoy es un día especial...\n\nY solo quiero que sonrías mucho 😄\n\nQue la pases bonito,\nque disfrutes cada momento\n\nY que este nuevo año\nte traiga cosas lindas ✨\n\nFeliz cumpleaños 💖\n\n— William";

  let i = 0;
  let cont = document.getElementById("mensaje");
  cont.style.opacity = 1;

  function escribirLetra(){
    if(i < texto.length){
      cont.innerHTML += texto.charAt(i);
      i++;
      setTimeout(escribirLetra, 40);
    }
  }

  escribirLetra();
}
</script>

</body>
</html>
