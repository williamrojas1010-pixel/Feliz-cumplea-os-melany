<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Melany 🎬</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  color: white;
}

/* 🎥 VIDEO */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
  filter: brightness(0.3);
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: -1;
}

/* PANTALLAS */
.pantalla {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
  transition: 1s;
}

/* OCULTAS */
.oculta {
  opacity: 0;
  transform: translateY(50px);
  pointer-events: none;
}

/* TEXTO */
h1 { font-size: 40px; }
p { font-size: 18px; }

/* BOTÓN */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  background: #00c6ff;
  color: white;
}

/* MENSAJE */
#mensaje {
  white-space: pre-line;
}
</style>
</head>

<body>

<video autoplay muted loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- PANTALLA 1 -->
<div class="pantalla" id="p1">
  <h1>MELANY 💫</h1>
</div>

<!-- PANTALLA 2 -->
<div class="pantalla oculta" id="p2">
  <h1>🎉 Feliz Cumpleaños</h1>
  <p>Hoy es un día especial ✨</p>
  <button class="btn" onclick="siguiente(3)">Continuar</button>
</div>

<!-- PANTALLA 3 -->
<div class="pantalla oculta" id="p3">
  <div id="mensaje"></div>
  <button class="btn" onclick="siguiente(4)">Ver más</button>
</div>

<!-- PANTALLA 4 -->
<div class="pantalla oculta" id="p4">
  <h1>🎂 Disfruta tu día</h1>
  <button class="btn" onclick="final()">Final 🎁</button>
</div>

<!-- MUSICA -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
setTimeout(() => siguiente(2), 2500);

function siguiente(num) {
  document.querySelectorAll(".pantalla").forEach(p => p.classList.add("oculta"));
  document.getElementById("p" + num).classList.remove("oculta");

  if (num === 3) escribir();
}

function escribir() {
  let texto = "🎂 Espero que sonrías mucho hoy,\nque la pases increíble 😄\ny que todo te salga bonito ✨";
  let i = 0;
  let cont = document.getElementById("mensaje");
  cont.innerHTML = "";

  function escribirLetra() {
    if (i < texto.length) {
      cont.innerHTML += texto.charAt(i);
      i++;
      setTimeout(escribirLetra, 40);
    }
  }
  escribirLetra();
}

function final() {
  let audio = document.getElementById("musica");
  audio.volume = 0;
  audio.play();

  let vol = 0;
  let fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.05;
      audio.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 100);

  alert("🎉 Feliz cumpleaños Melany 🎉");

  if (navigator.vibrate) navigator.vibrate(200);
}
</script>

</body>
</html>
