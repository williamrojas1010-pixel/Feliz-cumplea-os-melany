<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Cumpleaños Melany 🎉</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* 🎥 VIDEO FONDO */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* CONTENIDO */
#contenido {
  position: relative;
  top: 30%;
}

/* 🎉 TÍTULO GRANDE */
h1 {
  font-size: 55px;
  text-shadow: 0 0 20px black;
}

/* TEXTO */
p {
  font-size: 22px;
}

/* BOTONES */
.btn {
  padding: 14px 22px;
  margin: 10px;
  border: none;
  border-radius: 20px;
  font-size: 18px;
  cursor: pointer;
}

/* INSTAGRAM */
.insta {
  background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af);
  color: white;
}

/* SORPRESA */
.sorpresa {
  background: #00c6ff;
  color: white;
}

#mensaje {
  display: none;
  margin-top: 20px;
  font-size: 22px;
}
</style>
</head>

<body>

<!-- 🎥 VIDEO SIN SONIDO -->
<video autoplay muted loop>
  <source src="video.mp4" type="video/mp4">
</video>

<div id="contenido">
  <h1>🎉 FELIZ CUMPLEAÑOS MELANY 🎉</h1>
  <p>Espero que tengas un día increíble 😄✨</p>

  <!-- 📱 INSTAGRAM -->
  <a href="instagram://user?username=williamrojas1010">
    <button class="btn insta">Escríbeme en Instagram 💬</button>
  </a>

  <!-- 🎁 BOTÓN -->
  <button class="btn sorpresa" onclick="sorpresa()">Toca aquí 🎁</button>

  <div id="mensaje">
    🎂 Disfruta tu día al máximo 🎉<br>
    Que todo te salga bonito hoy ✨<br>
    Y que sonrías mucho 😄
  </div>
</div>

<!-- 🎵 MÚSICA (se activa al tocar) -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- 🎊 CONFETI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function sorpresa() {
  document.getElementById("mensaje").style.display = "block";

  // 🎵 reproducir música
  document.getElementById("musica").play();

  // 🎆 confeti
  confetti({
    particleCount: 200,
    spread: 90,
    origin: { y: 0.6 }
  });
}
</script>

</body>
</html>
